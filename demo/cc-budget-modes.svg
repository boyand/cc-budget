    <line x1="105" y1="8" x2="105" y2="36" stroke="#30363d" stroke-width="1"/>

    <!-- Mode 1: Max / Pro -->
    <g class="m1">
      <text x="20" y="27" fill="#8b949e">Max / Pro</text>
      <text x="118" y="27" xml:space="preserve"><tspan font-weight="bold" fill="#3fb950">5h</tspan><tspan fill="#3fb950"> ▓▓▓▓</tspan><tspan fill="#e6edf3" font-weight="bold">│</tspan><tspan fill="#3fb950">░░░</tspan><tspan fill="#3fb950"> 55%</tspan><tspan fill="#8b949e"> (+2.1)</tspan><tspan fill="#f85149"> ⇡5%</tspan><tspan fill="#8b949e"> ➞2h29m</tspan><tspan fill="#8b949e">  │  </tspan><tspan fill="#3fb950">▽</tspan><tspan fill="#8b949e"> off-peak 3h22m</tspan></text>
    </g>

