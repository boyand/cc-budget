      <text x="118" y="27"><tspan fill="#f85149">$14.50</tspan><tspan fill="#8b949e"> (+$2.15)</tspan><tspan fill="#8b949e">  │  </tspan><tspan fill="#8b949e">$22.80 today</tspan><tspan fill="#8b949e">  │  </tspan><tspan fill="#8b949e">$34.90 Mar</tspan></text>
